<!DOCTYPE html>
<html lang="en" data-theme="brass">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grains of Time — a vintage hourglass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display: 'Playfair Display', serif;
    --font-body: 'EB Garamond', serif;
    --font-label: 'Special Elite', monospace;
    --ease: cubic-bezier(.22,.9,.34,1);
  }

  /* ---------------- THEMES ---------------- */
  html[data-theme="brass"]{
    --bg-1: #1c130b; --bg-2: #2e1d0f;
    --ink: #f3e6c8; --ink-dim: #c9b790; --ink-faint: #8a7a5c;
    --frame-light: #e3c067; --frame-mid: #b8902f; --frame-dark: #6b4a1a;
    --wood-light: #6b4a2c; --wood-dark: #3a2415;
    --glass: #fff3d6;
    --sand-1: #f0c372; --sand-2: #c9822f; --sand-3: #8a5a1f;
    --accent: #d9a83b;
    --panel: #241809; --panel-line: rgba(243,230,200,0.14);
  }
  html[data-theme="midnight"]{
    --bg-1: #0a0e17; --bg-2: #161e2e;
    --ink: #e9e4d4; --ink-dim: #a9a8b8; --ink-faint: #66667a;
    --frame-light: #d8c485; --frame-mid: #b8995f; --frame-dark: #5c4a26;
    --wood-light: #2e3344; --wood-dark: #161a26;
    --glass: #dce6ff;
    --sand-1: #e6d59a; --sand-2: #b9a05a; --sand-3: #7a6736;
    --accent: #c2a25e;
    --panel: #0e1320; --panel-line: rgba(233,228,212,0.12);
  }
  html[data-theme="parchment"]{
    --bg-1: #e9dcc0; --bg-2: #ddc9a2;
    --ink: #3a2a1a; --ink-dim: #6b5439; --ink-faint: #998363;
    --frame-light: #a9714a; --frame-mid: #8a4a16; --frame-dark: #5c3210;
    --wood-light: #7a4d28; --wood-dark: #4a2e16;
    --glass: #fffaf0;
    --sand-1: #d98a44; --sand-2: #b5651d; --sand-3: #7c4514;
    --accent: #8a4a16;
    --panel: #f2e8d2; --panel-line: rgba(58,42,26,0.16);
  }
  html[data-theme="emerald"]{
    --bg-1: #0c1a14; --bg-2: #16291f;
    --ink: #e8e4d0; --ink-dim: #a8b3a6; --ink-faint: #647062;
    --frame-light: #e3c067; --frame-mid: #b8902f; --frame-dark: #6b4a1a;
    --wood-light: #1f3a2a; --wood-dark: #0e1f16;
    --glass: #d6ffe9;
    --sand-1: #d99a5c; --sand-2: #b5722e; --sand-3: #7a4a1d;
    --accent: #c9a227;
    --panel: #0e1f17; --panel-line: rgba(232,228,208,0.12);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 0%, color-mix(in srgb, var(--bg-2) 60%, transparent), transparent 60%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2));
    color:var(--ink);
    font-family:var(--font-body);
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    transition:background .6s var(--ease), color .6s var(--ease);
    position:relative;
  }

  /* film-grain overlay */
  body::before{
    content:'';
    position:fixed; inset:0;
    pointer-events:none;
    z-index:1;
    opacity:0.05;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* drifting dust motes, lit faintly by the theme accent */
  #dustCanvas{
    position:fixed; inset:0;
    z-index:1;
    pointer-events:none;
  }

  ::selection{ background:var(--accent); color:var(--bg-1); }
  a, button{ font-family:inherit; }

  button:focus-visible, input:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
  }

  .stage{
    position:relative;
    z-index:2;
    width:100%;
    max-width:560px;
    padding:36px 24px 60px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  /* ---------------- Header ---------------- */
  .brand{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(26px,5vw,34px);
    letter-spacing:0.01em;
  }
  .tagline{
    font-family:var(--font-label);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-top:8px;
  }

  .theme-row{
    display:flex;
    gap:14px;
    margin-top:26px;
  }
  .theme-swatch{
    width:26px; height:26px;
    border-radius:50%;
    border:2px solid var(--panel-line);
    cursor:pointer;
    position:relative;
    transition:transform .25s var(--ease), border-color .25s var(--ease);
    padding:0;
  }
  .theme-swatch:hover{ transform:translateY(-2px); }
  .theme-swatch[data-active="true"]{
    border-color:var(--accent);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
  }
  .theme-swatch.t-brass{ background:linear-gradient(135deg,#e3c067,#6b4a1a); }
  .theme-swatch.t-midnight{ background:linear-gradient(135deg,#2e3344,#0a0e17); }
  .theme-swatch.t-parchment{ background:linear-gradient(135deg,#e9dcc0,#8a4a16); }
  .theme-swatch.t-emerald{ background:linear-gradient(135deg,#16291f,#c9a227); }

  /* ---------------- Quote ---------------- */
  .quote{
    font-family:var(--font-display);
    font-style:italic;
    font-weight:500;
    font-size:clamp(16px,3.4vw,20px);
    line-height:1.5;
    max-width:34ch;
    color:var(--ink-dim);
    margin:34px 0 8px;
    min-height:3.2em;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:1;
    transform:translateY(0);
    transition:opacity .6s var(--ease), transform .6s var(--ease);
  }
  .quote.fading{ opacity:0; transform:translateY(10px); }

  /* ---------------- Hourglass ---------------- */
  .glass-stage{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .glow{
    position:absolute;
    top:50%; left:50%;
    width:320px; height:320px;
    transform:translate(-50%,-50%) scale(0.94);
    border-radius:50%;
    background:radial-gradient(circle, color-mix(in srgb, var(--accent) 32%, transparent) 0%, transparent 70%);
    filter:blur(28px);
    animation:glowPulse 5s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
  }
  @keyframes glowPulse{
    0%,100%{ opacity:0.45; transform:translate(-50%,-50%) scale(0.92); }
    50%{ opacity:0.85; transform:translate(-50%,-50%) scale(1.06); }
  }
  .glass-wrap{
    position:relative;
    z-index:1;
    width:min(280px, 62vw);
    aspect-ratio:280/450;
    margin:10px 0 4px;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,0.45));
  }
  /* The flip is a one-shot ritual spin that always lands back at a full
     rotation (360deg == 0deg). It never persists, so the sand simulation
     underneath (which always assumes neutral orientation) stays correct —
     this is what fixes sand ever appearing to climb upward after a flip. */
  @keyframes hourglassFlip{
    0%{ transform:rotate(0deg); }
    55%{ transform:rotate(195deg) scale(1.04); }
    100%{ transform:rotate(360deg); }
  }
  .glass-wrap.flipping{
    animation:hourglassFlip 0.9s cubic-bezier(.36,1.15,.34,1) 1;
  }
  .glass-wrap canvas, .glass-wrap svg{
    position:absolute; inset:0;
    width:100%; height:100%;
  }

  .readout{
    font-family:var(--font-label);
    font-size:clamp(22px,5vw,28px);
    letter-spacing:0.08em;
    color:var(--accent);
    margin-top:18px;
    padding:8px 22px;
    border:1px solid var(--panel-line);
    border-radius:3px;
    background:color-mix(in srgb, var(--panel) 70%, transparent);
    min-width:140px;
  }
  .readout .label{
    display:block;
    font-size:9px;
    letter-spacing:0.18em;
    color:var(--ink-faint);
    margin-bottom:4px;
  }

  /* ---------------- Controls ---------------- */
  .controls{
    display:flex;
    gap:14px;
    margin-top:30px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .btn{
    font-family:var(--font-label);
    font-size:12px;
    letter-spacing:0.06em;
    padding:13px 22px;
    border-radius:2px;
    border:1px solid var(--panel-line);
    background:transparent;
    color:var(--ink-dim);
    cursor:pointer;
    transition:all .3s var(--ease);
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .btn:hover{ border-color:var(--accent); color:var(--ink); transform:translateY(-2px); }
  .btn-primary{
    background:var(--accent);
    color:var(--bg-1);
    border-color:var(--accent);
  }
  .btn-primary:hover{ filter:brightness(1.1); color:var(--bg-1); }
  .btn-icon{
    width:42px; height:42px;
    padding:0;
    justify-content:center;
    border-radius:50%;
  }
  .btn[hidden]{ display:none; }

  .footer-credit{
    margin-top:54px;
    font-family:var(--font-label);
    font-size:10px;
    letter-spacing:0.12em;
    color:var(--ink-faint);
    opacity:0.7;
  }

  /* ---------------- Choose-time panel ---------------- */
  .overlay{
    position:fixed; inset:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(8,6,3,0.6);
    backdrop-filter:blur(4px);
    opacity:0;
    pointer-events:none;
    transition:opacity .35s var(--ease);
    padding:20px;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .panel{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:36px 32px;
    max-width:420px;
    width:100%;
    transform:translateY(16px) scale(0.98);
    transition:transform .35s var(--ease);
  }
  .overlay.open .panel{ transform:translateY(0) scale(1); }

  .panel h2{
    font-family:var(--font-display);
    font-size:22px;
    margin-bottom:6px;
  }
  .panel .sub{
    font-size:13px;
    color:var(--ink-faint);
    margin-bottom:24px;
  }

  .chip-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:22px;
  }
  .chip{
    font-family:var(--font-label);
    font-size:13px;
    padding:12px 4px;
    border:1px solid var(--panel-line);
    border-radius:3px;
    background:transparent;
    color:var(--ink-dim);
    cursor:pointer;
    transition:all .25s var(--ease);
  }
  .chip:hover{ border-color:var(--accent); color:var(--ink); }
  .chip[data-selected="true"]{
    background:var(--accent);
    color:var(--bg-1);
    border-color:var(--accent);
  }

  .custom-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:26px;
    font-size:13px;
    color:var(--ink-dim);
  }
  .custom-row input{
    width:70px;
    background:transparent;
    border:1px solid var(--panel-line);
    border-radius:3px;
    color:var(--ink);
    font-family:var(--font-label);
    font-size:14px;
    padding:9px 10px;
    text-align:center;
  }
  .custom-row input:focus{ border-color:var(--accent); outline:none; }

  .panel-actions{
    display:flex;
    justify-content:flex-end;
    gap:12px;
  }

  /* ---------------- Completion overlay ---------------- */
  .finish-overlay{
    position:fixed; inset:0;
    z-index:60;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(8,6,3,0.72);
    backdrop-filter:blur(5px);
    opacity:0;
    pointer-events:none;
    transition:opacity .5s var(--ease);
    padding:20px;
  }
  .finish-overlay.open{ opacity:1; pointer-events:auto; }
  .stamp{
    position:relative;
    text-align:center;
    transform:scale(1.5) rotate(-6deg);
    opacity:0;
    transition:transform .5s cubic-bezier(.2,1.4,.4,1), opacity .4s var(--ease);
  }
  .finish-overlay.open .stamp{ transform:scale(1) rotate(-3deg); opacity:1; }
  .stamp::before{
    content:'';
    position:absolute;
    top:60px; left:50%;
    width:40px; height:40px;
    margin-left:-20px;
    border:2px solid var(--accent);
    border-radius:50%;
    opacity:0;
    pointer-events:none;
    z-index:-1;
  }
  .finish-overlay.open .stamp::before{
    animation:ringPulse 0.9s ease-out 0.2s 1;
  }
  @keyframes ringPulse{
    0%{ opacity:0.7; transform:scale(0.3); }
    100%{ opacity:0; transform:scale(7); }
  }
  .stamp h2{
    font-family:var(--font-display);
    font-size:clamp(28px,6vw,40px);
    color:var(--accent);
    border:3px solid var(--accent);
    padding:18px 30px;
    border-radius:4px;
    display:inline-block;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .stamp p{
    margin-top:22px;
    color:var(--ink-dim);
    font-style:italic;
    font-family:var(--font-display);
    font-size:16px;
  }
  .stamp .btn{ margin-top:30px; }

  @media (max-width:480px){
    .chip-grid{ grid-template-columns:repeat(3,1fr); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition-duration:0.001ms !important; animation-duration:0.001ms !important; }
    .glass-wrap.flipping{ animation:none; }
    .glow{ animation:none; opacity:0.5; }
  }
</style>
</head>
<body>

<canvas id="dustCanvas" aria-hidden="true"></canvas>

<div class="stage">

  <div class="brand">Grains of Time</div>
  <div class="tagline">a vintage hourglass for noticing the hour you're in</div>

  <div class="theme-row" id="themeRow">
    <button class="theme-swatch t-brass" data-theme="brass" data-active="true" aria-label="Brass theme"></button>
    <button class="theme-swatch t-midnight" data-theme="midnight" aria-label="Midnight theme"></button>
    <button class="theme-swatch t-parchment" data-theme="parchment" aria-label="Parchment theme"></button>
    <button class="theme-swatch t-emerald" data-theme="emerald" aria-label="Emerald theme"></button>
  </div>

  <div class="quote" id="quote">Choose your hour. Then give it your full attention.</div>

  <div class="glass-stage">
    <div class="glow" aria-hidden="true"></div>
    <div class="glass-wrap" id="glassWrap">
      <canvas id="sandCanvas"></canvas>
      <svg id="frameSvg" viewBox="0 0 280 450" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div class="readout"><span class="label">Remaining</span><span id="timeText">00:00</span></div>

  <div class="controls">
    <button class="btn btn-primary" id="chooseBtn">Choose Your Time</button>
    <button class="btn" id="pauseBtn" hidden>Pause</button>
    <button class="btn" id="flipBtn" hidden>Flip Again</button>
    <button class="btn btn-icon" id="muteBtn" aria-label="Toggle sound">🔔</button>
  </div>

  <div class="footer-credit">EVERY GRAIN FALLS ONCE</div>
</div>

<!-- Choose-time panel -->
<div class="overlay" id="timeOverlay">
  <div class="panel">
    <h2>Set the hourglass</h2>
    <div class="sub">Pick how long you'd like to give this moment.</div>
    <div class="chip-grid" id="chipGrid"></div>
    <div class="custom-row">
      <span>or custom:</span>
      <input type="number" id="customMinutes" min="1" max="180" placeholder="min">
      <span>minutes</span>
    </div>
    <div class="panel-actions">
      <button class="btn" id="cancelTimeBtn">Cancel</button>
      <button class="btn btn-primary" id="beginBtn">Begin</button>
    </div>
  </div>
</div>

<!-- Completion overlay -->
<div class="finish-overlay" id="finishOverlay">
  <div class="stamp">
    <h2>Time's Up</h2>
    <p id="finishMessage">Time well spent.</p>
    <button class="btn btn-primary" id="finishOkBtn">Begin Again</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ============================================================
     GEOMETRY — shared between SVG frame and canvas sand drawing
     ============================================================ */
  const GEO = {
    w: 280, h: 450,
    cx: 140,
    bulbHalfW: 110,         // wide edge half-width
    neckHalfW: 8,           // neck half-width
    topCapY: 18, capH: 22,  // top cap spans 18-40
    topBulbTopY: 40,
    neckTopY: 200, neckBottomY: 222,
    bottomBulbBottomY: 382,
    bottomCapY: 382,
    baseY: 412, baseH: 16,
    pillarLeftX: 16, pillarRightX: 256, pillarW: 8,
    pillarTopY: 14, pillarBottomY: 408
  };

  /* ============================================================
     SVG FRAME — built once, themed entirely via CSS variables
     ============================================================ */
  const svg = document.getElementById('frameSvg');
  const SVGNS = 'http://www.w3.org/2000/svg';

  function el(tag, attrs){
    const node = document.createElementNS(SVGNS, tag);
    for(const k in attrs) node.setAttribute(k, attrs[k]);
    return node;
  }

  function buildFrame(){
    // defs: gradients + blur filter
    const defs = el('defs', {});

    const brassGrad = el('linearGradient', { id:'brassGrad', x1:'0', y1:'0', x2:'0', y2:'1' });
    brassGrad.appendChild(el('stop', { offset:'0%', class:'stopLight' }));
    brassGrad.appendChild(el('stop', { offset:'50%', class:'stopMid' }));
    brassGrad.appendChild(el('stop', { offset:'100%', class:'stopDark' }));
    defs.appendChild(brassGrad);

    const woodGrad = el('linearGradient', { id:'woodGrad', x1:'0', y1:'0', x2:'1', y2:'0' });
    woodGrad.appendChild(el('stop', { offset:'0%', class:'stopWoodLight' }));
    woodGrad.appendChild(el('stop', { offset:'100%', class:'stopWoodDark' }));
    defs.appendChild(woodGrad);

    const blur = el('filter', { id:'softBlur' });
    blur.appendChild(el('feGaussianBlur', { stdDeviation:'3' }));
    defs.appendChild(blur);

    svg.appendChild(defs);

    // ---- pillars (wood) ----
    [GEO.pillarLeftX, GEO.pillarRightX].forEach(x => {
      svg.appendChild(el('rect', {
        x, y: GEO.pillarTopY, width: GEO.pillarW, height: GEO.pillarBottomY - GEO.pillarTopY,
        rx: 3, class:'pillar'
      }));
      // bead rings for turned-wood look
      [0.18, 0.5, 0.82].forEach(frac => {
        const y = GEO.pillarTopY + (GEO.pillarBottomY - GEO.pillarTopY) * frac;
        svg.appendChild(el('rect', { x: x-2, y: y-4, width: GEO.pillarW+4, height: 8, rx: 3, class:'bead' }));
      });
    });

    // ---- bottom base foot ----
    svg.appendChild(el('rect', {
      x: 12, y: GEO.baseY, width: GEO.w-24, height: GEO.baseH, rx: 8, class:'baseFoot'
    }));

    // ---- top + bottom brass caps ----
    svg.appendChild(el('rect', {
      x: GEO.cx-GEO.bulbHalfW-10, y: GEO.topCapY, width: (GEO.bulbHalfW+10)*2, height: GEO.capH,
      rx: 6, class:'cap'
    }));
    svg.appendChild(el('rect', {
      x: GEO.cx-GEO.bulbHalfW-10, y: GEO.bottomCapY, width: (GEO.bulbHalfW+10)*2, height: GEO.capH,
      rx: 6, class:'cap'
    }));

    // ---- top finial knob ----
    svg.appendChild(el('circle', { cx: GEO.cx, cy: 9, r: 7, class:'cap' }));
    svg.appendChild(el('rect', { x: GEO.cx-2, y: 12, width: 4, height: 8, class:'cap' }));

    // ---- glass bulbs (paths) ----
    const topBulbD = `M${GEO.cx-GEO.bulbHalfW},${GEO.topBulbTopY}
      L${GEO.cx+GEO.bulbHalfW},${GEO.topBulbTopY}
      Q${GEO.cx+GEO.bulbHalfW},${(GEO.topBulbTopY+GEO.neckTopY)/2} ${GEO.cx+GEO.neckHalfW},${GEO.neckTopY}
      L${GEO.cx-GEO.neckHalfW},${GEO.neckTopY}
      Q${GEO.cx-GEO.bulbHalfW},${(GEO.topBulbTopY+GEO.neckTopY)/2} ${GEO.cx-GEO.bulbHalfW},${GEO.topBulbTopY}
      Z`;
    const bottomBulbD = `M${GEO.cx-GEO.neckHalfW},${GEO.neckBottomY}
      L${GEO.cx+GEO.neckHalfW},${GEO.neckBottomY}
      Q${GEO.cx+GEO.bulbHalfW},${(GEO.neckBottomY+GEO.bottomBulbBottomY)/2} ${GEO.cx+GEO.bulbHalfW},${GEO.bottomBulbBottomY}
      L${GEO.cx-GEO.bulbHalfW},${GEO.bottomBulbBottomY}
      Q${GEO.cx-GEO.bulbHalfW},${(GEO.neckBottomY+GEO.bottomBulbBottomY)/2} ${GEO.cx-GEO.neckHalfW},${GEO.neckBottomY}
      Z`;

    [topBulbD, bottomBulbD].forEach(d => {
      svg.appendChild(el('path', { d, class:'glassFill' }));
      svg.appendChild(el('path', { d, class:'glassStroke' }));
    });

    // ---- glass shine streaks ----
    svg.appendChild(el('path', {
      d:`M${GEO.cx-70},${GEO.topBulbTopY+18} Q${GEO.cx-90},110 ${GEO.cx-40},${GEO.neckTopY-15}`,
      class:'shine', filter:'url(#softBlur)'
    }));
    svg.appendChild(el('path', {
      d:`M${GEO.cx-70},${GEO.neckBottomY+15} Q${GEO.cx-90},300 ${GEO.cx-40},${GEO.bottomBulbBottomY-18}`,
      class:'shine', filter:'url(#softBlur)'
    }));

    // ---- waist ring (decorative brass band around neck) ----
    svg.appendChild(el('rect', {
      x: GEO.cx-GEO.bulbHalfW-6, y:(GEO.neckTopY+GEO.neckBottomY)/2 - 3,
      width:(GEO.bulbHalfW+6)*2, height:6, rx:2, class:'waistRing'
    }));
  }
  buildFrame();

  // theme-driven SVG colors (CSS handles fill via classes below, injected once)
  const svgStyle = document.createElementNS(SVGNS, 'style');
  svgStyle.textContent = `
    .stopLight{ stop-color:var(--frame-light); }
    .stopMid{ stop-color:var(--frame-mid); }
    .stopDark{ stop-color:var(--frame-dark); }
    .stopWoodLight{ stop-color:var(--wood-light); }
    .stopWoodDark{ stop-color:var(--wood-dark); }
    .pillar{ fill:url(#woodGrad); stroke:var(--wood-dark); stroke-width:1; }
    .bead{ fill:url(#brassGrad); }
    .baseFoot{ fill:url(#woodGrad); stroke:var(--wood-dark); stroke-width:1; }
    .cap{ fill:url(#brassGrad); stroke:var(--frame-dark); stroke-width:1; }
    .waistRing{ fill:url(#brassGrad); stroke:var(--frame-dark); stroke-width:0.5; opacity:0.95; }
    .glassFill{ fill:var(--glass); opacity:0.07; }
    .glassStroke{ fill:none; stroke:var(--glass); stroke-width:1.5; opacity:0.35; }
    .shine{ fill:none; stroke:var(--glass); stroke-width:7; opacity:0.18; stroke-linecap:round; }
  `;
  svg.insertBefore(svgStyle, svg.firstChild);

  /* ============================================================
     CANVAS — sand rendering (mounds + falling stream + texture)
     ============================================================ */
  const canvas = document.getElementById('sandCanvas');
  const ctx = canvas.getContext('2d');

  function fitCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    const scaleX = canvas.width / GEO.w;
    const scaleY = canvas.height / GEO.h;
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0); // draw in GEO coordinate space
  }
  fitCanvas();
  window.addEventListener('resize', fitCanvas);

  function sandColors(){
    const cs = getComputedStyle(document.documentElement);
    return {
      c1: cs.getPropertyValue('--sand-1').trim(),
      c2: cs.getPropertyValue('--sand-2').trim(),
      c3: cs.getPropertyValue('--sand-3').trim()
    };
  }
  let SAND = sandColors();

  function topBulbPath(){
    const p = new Path2D(`M${GEO.cx-GEO.bulbHalfW},${GEO.topBulbTopY}
      L${GEO.cx+GEO.bulbHalfW},${GEO.topBulbTopY}
      Q${GEO.cx+GEO.bulbHalfW},${(GEO.topBulbTopY+GEO.neckTopY)/2} ${GEO.cx+GEO.neckHalfW},${GEO.neckTopY}
      L${GEO.cx-GEO.neckHalfW},${GEO.neckTopY}
      Q${GEO.cx-GEO.bulbHalfW},${(GEO.topBulbTopY+GEO.neckTopY)/2} ${GEO.cx-GEO.bulbHalfW},${GEO.topBulbTopY}
      Z`);
    return p;
  }
  function bottomBulbPath(){
    const p = new Path2D(`M${GEO.cx-GEO.neckHalfW},${GEO.neckBottomY}
      L${GEO.cx+GEO.neckHalfW},${GEO.neckBottomY}
      Q${GEO.cx+GEO.bulbHalfW},${(GEO.neckBottomY+GEO.bottomBulbBottomY)/2} ${GEO.cx+GEO.bulbHalfW},${GEO.bottomBulbBottomY}
      L${GEO.cx-GEO.bulbHalfW},${GEO.bottomBulbBottomY}
      Q${GEO.cx-GEO.bulbHalfW},${(GEO.neckBottomY+GEO.bottomBulbBottomY)/2} ${GEO.cx-GEO.neckHalfW},${GEO.neckBottomY}
      Z`);
    return p;
  }
  const TOP_PATH = topBulbPath();
  const BOTTOM_PATH = bottomBulbPath();

  // fixed-seed texture dots (regenerated only on resize/theme, not every frame)
  function makeTextureDots(n){
    const dots = [];
    for(let i=0;i<n;i++){
      dots.push({ rx: Math.random(), ry: Math.random(), r: Math.random()*1.1+0.4, shade: Math.random() });
    }
    return dots;
  }
  const topDots = makeTextureDots(140);
  const bottomDots = makeTextureDots(140);

  // particle pool for the falling stream
  const PARTICLE_COUNT = 10;
  const particles = [];
  for(let i=0;i<PARTICLE_COUNT;i++){
    particles.push({ y: GEO.neckTopY + Math.random()*(GEO.neckBottomY-GEO.neckTopY), x: GEO.cx + (Math.random()-0.5)*3, speed: 1.6+Math.random()*1.0, life: Math.random() });
  }

  function drawSand(progress, running, bottomFillExtra){
    // progress: 0 (full top, empty bottom) -> 1 (empty top, full bottom)
    ctx.clearRect(0,0,GEO.w,GEO.h);

    const grad1 = ctx.createLinearGradient(0, GEO.topBulbTopY, 0, GEO.bottomBulbBottomY);
    grad1.addColorStop(0, SAND.c1);
    grad1.addColorStop(1, SAND.c3);

    // ---- TOP MOUND ----
    ctx.save();
    ctx.clip(TOP_PATH);
    const topSurfaceY = GEO.topBulbTopY + (GEO.neckTopY - GEO.topBulbTopY) * progress;
    if(progress < 0.999){
      ctx.beginPath();
      ctx.moveTo(GEO.cx-GEO.bulbHalfW-4, topSurfaceY);
      // slight concave dip toward the neck (funnel effect)
      ctx.quadraticCurveTo(GEO.cx, topSurfaceY + 10, GEO.cx+GEO.bulbHalfW+4, topSurfaceY);
      ctx.lineTo(GEO.cx+GEO.bulbHalfW+4, GEO.neckTopY+2);
      ctx.lineTo(GEO.cx-GEO.bulbHalfW-4, GEO.neckTopY+2);
      ctx.closePath();
      ctx.fillStyle = grad1;
      ctx.fill();

      // texture
      ctx.globalAlpha = 0.5;
      topDots.forEach(d => {
        const dy = topSurfaceY + d.ry*(GEO.neckTopY-topSurfaceY);
        const dx = GEO.cx-GEO.bulbHalfW + d.rx*GEO.bulbHalfW*2;
        if(dy >= topSurfaceY-2){
          ctx.fillStyle = d.shade > 0.5 ? SAND.c3 : SAND.c1;
          ctx.beginPath();
          ctx.arc(dx, dy, d.r, 0, Math.PI*2);
          ctx.fill();
        }
      });
      ctx.globalAlpha = 1;
    }
    ctx.restore();

    // ---- BOTTOM MOUND ----
    ctx.save();
    ctx.clip(BOTTOM_PATH);
    const fillFrac = Math.min(1, progress + (bottomFillExtra||0));
    const bottomSurfaceY = GEO.bottomBulbBottomY - (GEO.bottomBulbBottomY - GEO.neckBottomY) * fillFrac;
    if(fillFrac > 0.001){
      ctx.beginPath();
      ctx.moveTo(GEO.cx-GEO.bulbHalfW-4, GEO.bottomBulbBottomY+2);
      ctx.lineTo(GEO.cx-GEO.bulbHalfW-4, bottomSurfaceY);
      // gentle peak in the middle, growing with fill
      const peak = 14 * fillFrac;
      ctx.quadraticCurveTo(GEO.cx, bottomSurfaceY - peak, GEO.cx+GEO.bulbHalfW+4, bottomSurfaceY);
      ctx.lineTo(GEO.cx+GEO.bulbHalfW+4, GEO.bottomBulbBottomY+2);
      ctx.closePath();
      ctx.fillStyle = grad1;
      ctx.fill();

      ctx.globalAlpha = 0.5;
      bottomDots.forEach(d => {
        const dy = bottomSurfaceY + d.ry*(GEO.bottomBulbBottomY-bottomSurfaceY);
        const dx = GEO.cx-GEO.bulbHalfW + d.rx*GEO.bulbHalfW*2;
        ctx.fillStyle = d.shade > 0.5 ? SAND.c3 : SAND.c1;
        ctx.beginPath();
        ctx.arc(dx, dy, d.r, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }
    ctx.restore();

    // ---- FALLING STREAM ----
    if(running && progress < 0.999){
      ctx.save();
      ctx.beginPath();
      ctx.rect(GEO.cx-GEO.neckHalfW, GEO.neckTopY-2, GEO.neckHalfW*2, GEO.neckBottomY-GEO.neckTopY+4);
      ctx.clip();
      ctx.strokeStyle = SAND.c2;
      ctx.lineWidth = 1.6;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(GEO.cx, GEO.neckTopY-2);
      ctx.lineTo(GEO.cx, GEO.neckBottomY+2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();

      particles.forEach(p => {
        p.y += p.speed;
        if(p.y > bottomSurfaceY || p.y > GEO.bottomBulbBottomY){
          p.y = GEO.neckTopY + Math.random()*4;
          p.x = GEO.cx + (Math.random()-0.5)*3;
        }
        ctx.fillStyle = SAND.c1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.1, 0, Math.PI*2);
        ctx.fill();
      });
    }
  }

  /* ============================================================
     QUOTES
     ============================================================ */
  const RUNNING_QUOTES = [
    "Time spends itself, whether you notice or not.",
    "A grain once fallen never climbs back.",
    "Busy is not the same as alive.",
    "What you give your attention to, you give your life to.",
    "The hourglass doesn't pause for permission.",
    "Most hours are forgotten. Make this one count.",
    "You are not managing time. You are spending yourself.",
    "Patience is just time, worn gracefully.",
    "Nothing returns less than wasted time.",
    "Slow down. The sand won't.",
    "Presence is the only currency that matters here.",
    "Every grain is a choice you already made.",
    "Time doesn't ask twice.",
    "What fills this hour will not fill the next.",
    "Stillness is also a way of spending time well.",
    "The glass doesn't care what you do — only that you do it.",
    "An unwatched hour is still an hour spent.",
    "You can't save time. You can only spend it on purpose.",
    "This moment will not repeat itself.",
    "Watch closely — this is what an hour looks like."
  ];
  const IDLE_QUOTE = "Choose your hour. Then give it your full attention.";
  const PAUSE_QUOTE = "Even the sand is allowed to rest. Briefly.";
  const FINISH_MESSAGES = [
    "Time well spent.",
    "That hour is yours now. What did you make of it?",
    "The grains have settled. So should you, for a moment.",
    "Done. Not gone — spent, on purpose.",
    "An hour, accounted for.",
    "The glass is empty. Was the time?",
    "Flip it again, or carry this one forward.",
    "Every ending is sand for the next beginning."
  ];

  const quoteEl = document.getElementById('quote');
  let quoteIndex = 0;
  let quoteTimer = null;

  function setQuote(text){
    quoteEl.classList.add('fading');
    setTimeout(() => {
      quoteEl.textContent = text;
      quoteEl.classList.remove('fading');
    }, reduceMotion ? 0 : 350);
  }
  function startQuoteRotation(){
    stopQuoteRotation();
    quoteIndex = Math.floor(Math.random()*RUNNING_QUOTES.length);
    setQuote(RUNNING_QUOTES[quoteIndex]);
    quoteTimer = setInterval(() => {
      quoteIndex = (quoteIndex+1) % RUNNING_QUOTES.length;
      setQuote(RUNNING_QUOTES[quoteIndex]);
      playMusicBoxNote();
    }, 26000);
  }
  function stopQuoteRotation(){
    if(quoteTimer){ clearInterval(quoteTimer); quoteTimer = null; }
  }

  /* ============================================================
     TIMER STATE MACHINE
     ============================================================ */
  const state = {
    totalMs: 0,
    remainingMs: 0,
    running: false,
    finished: false,
    lastTick: 0
  };

  const timeText = document.getElementById('timeText');
  const chooseBtn = document.getElementById('chooseBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const flipBtn = document.getElementById('flipBtn');
  const glassWrap = document.getElementById('glassWrap');

  function formatTime(ms){
    const totalSec = Math.max(0, Math.ceil(ms/1000));
    const m = Math.floor(totalSec/60);
    const s = totalSec%60;
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  function renderTimeText(){
    timeText.textContent = state.totalMs > 0 ? formatTime(state.remainingMs) : '00:00';
  }

  // One-shot ritual spin. Always completes a full 360deg, so it lands back
  // at neutral orientation — the sand drawing logic never has to account
  // for rotation, which is what keeps the fill direction correct.
  function triggerFlip(){
    if(reduceMotion) return;
    glassWrap.classList.remove('flipping');
    void glassWrap.offsetWidth; // force reflow so the animation can restart
    glassWrap.classList.add('flipping');
  }

  function animLoop(ts){
    if(state.running){
      if(!state.lastTick) state.lastTick = ts;
      const dt = ts - state.lastTick;
      state.lastTick = ts;
      state.remainingMs = Math.max(0, state.remainingMs - dt);
      if(state.remainingMs <= 0){
        finishTimer();
      }
    } else {
      state.lastTick = 0;
    }

    const progress = state.totalMs > 0 ? 1 - (state.remainingMs / state.totalMs) : 0;
    drawSand(progress, state.running);
    renderTimeText();

    requestAnimationFrame(animLoop);
  }
  requestAnimationFrame(animLoop);

  function beginSession(minutes){
    state.totalMs = minutes * 60 * 1000;
    state.remainingMs = state.totalMs;
    state.running = true;
    state.finished = false;
    state.lastTick = 0;

    triggerFlip();

    chooseBtn.textContent = 'Choose a Different Time';
    pauseBtn.hidden = false;
    pauseBtn.textContent = 'Pause';
    flipBtn.hidden = false;

    startQuoteRotation();
    ensureAudio();
    startAmbient();
    playMusicBoxNote();
  }

  function togglePause(){
    if(state.totalMs === 0 || state.finished) return;
    state.running = !state.running;
    pauseBtn.textContent = state.running ? 'Pause' : 'Resume';
    if(state.running){
      startQuoteRotation();
      startAmbient();
    } else {
      stopQuoteRotation();
      setQuote(PAUSE_QUOTE);
      stopAmbient();
    }
  }

  function flipAgain(){
    if(state.totalMs === 0) return;
    beginSession(state.totalMs / 60000);
  }

  function finishTimer(){
    state.running = false;
    state.finished = true;
    stopQuoteRotation();
    stopAmbient();
    playChime();
    const msg = FINISH_MESSAGES[Math.floor(Math.random()*FINISH_MESSAGES.length)];
    document.getElementById('finishMessage').textContent = msg;
    document.getElementById('finishOverlay').classList.add('open');
  }

  pauseBtn.addEventListener('click', togglePause);
  flipBtn.addEventListener('click', flipAgain);
  document.getElementById('finishOkBtn').addEventListener('click', () => {
    document.getElementById('finishOverlay').classList.remove('open');
    setQuote(IDLE_QUOTE);
  });

  /* ============================================================
     CHOOSE-TIME PANEL
     ============================================================ */
  const PRESETS = [1, 3, 5, 10, 15, 25, 45, 60];
  const chipGrid = document.getElementById('chipGrid');
  const customInput = document.getElementById('customMinutes');
  const timeOverlay = document.getElementById('timeOverlay');
  let selectedMinutes = null;

  PRESETS.forEach(min => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = min + ' min';
    chip.addEventListener('click', () => {
      selectedMinutes = min;
      customInput.value = '';
      [...chipGrid.children].forEach(c => c.removeAttribute('data-selected'));
      chip.setAttribute('data-selected', 'true');
    });
    chipGrid.appendChild(chip);
  });

  customInput.addEventListener('input', () => {
    if(customInput.value){
      selectedMinutes = null;
      [...chipGrid.children].forEach(c => c.removeAttribute('data-selected'));
    }
  });

  function openPanel(){ timeOverlay.classList.add('open'); }
  function closePanel(){ timeOverlay.classList.remove('open'); }

  chooseBtn.addEventListener('click', openPanel);
  document.getElementById('cancelTimeBtn').addEventListener('click', closePanel);
  timeOverlay.addEventListener('click', (e) => { if(e.target === timeOverlay) closePanel(); });

  document.getElementById('beginBtn').addEventListener('click', () => {
    let minutes = selectedMinutes;
    if(!minutes && customInput.value){
      minutes = Math.min(180, Math.max(1, parseInt(customInput.value, 10) || 0));
    }
    if(!minutes || minutes <= 0) return;
    closePanel();
    beginSession(minutes);
  });

  /* ============================================================
     THEMES
     ============================================================ */
  const themeRow = document.getElementById('themeRow');
  themeRow.addEventListener('click', (e) => {
    const btn = e.target.closest('.theme-swatch');
    if(!btn) return;
    document.documentElement.setAttribute('data-theme', btn.dataset.theme);
    [...themeRow.children].forEach(c => c.removeAttribute('data-active'));
    btn.setAttribute('data-active', 'true');
    SAND = sandColors();
  });

  /* ============================================================
     SOUND — vintage soundscape: soft drone, music-box plucks, chime
     ============================================================ */
  let audioCtx = null;
  let muted = false;
  const muteBtn = document.getElementById('muteBtn');

  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtx = null; }
    } else if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
  }

  // soft sustained pad — present only while the timer is actually running
  let ambientNodes = null;
  function startAmbient(){
    if(muted || !audioCtx || ambientNodes) return;
    const now = audioCtx.currentTime;
    const masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0, now);
    masterGain.gain.linearRampToValueAtTime(0.05, now + 2.5);
    masterGain.connect(audioCtx.destination);

    const freqs = [130.81, 196.00]; // C3 + G3, a quiet open fifth
    const oscs = freqs.map((f, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;

      // slow drift so the drone breathes instead of sitting static
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.07 + i*0.02;
      lfoGain.gain.value = 1.4;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);

      osc.connect(masterGain);
      lfo.start();
      osc.start();
      return { osc, lfo };
    });

    ambientNodes = { masterGain, oscs };
  }

  function stopAmbient(){
    if(!ambientNodes || !audioCtx) return;
    const now = audioCtx.currentTime;
    const nodes = ambientNodes;
    nodes.masterGain.gain.cancelScheduledValues(now);
    nodes.masterGain.gain.setValueAtTime(nodes.masterGain.gain.value, now);
    nodes.masterGain.gain.linearRampToValueAtTime(0, now + 1.2);
    setTimeout(() => {
      nodes.oscs.forEach(({osc, lfo}) => { try{ osc.stop(); lfo.stop(); }catch(e){} });
    }, 1300);
    ambientNodes = null;
  }

  // single soft plucked note, cycling a pentatonic scale — one per
  // reflection change, so the "melody" unfolds in step with the copy
  const PENTATONIC = [523.25, 587.33, 659.25, 783.99, 880.00]; // C D E G A (5th octave)
  let noteIndex = 0;
  function playMusicBoxNote(){
    if(muted || !audioCtx) return;
    const now = audioCtx.currentTime;
    const freq = PENTATONIC[noteIndex % PENTATONIC.length];
    noteIndex++;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.055, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0008, now + 1.8);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 1.9);
  }

  function playChime(){
    if(muted || !audioCtx) return;
    const now = audioCtx.currentTime;
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i*0.15);
      gain.gain.linearRampToValueAtTime(0.07, now + i*0.15 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.15 + 1.4);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i*0.15);
      osc.stop(now + i*0.15 + 1.5);
    });
  }

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔕' : '🔔';
    ensureAudio();
    if(muted){
      stopAmbient();
    } else if(state.running){
      startAmbient();
    }
  });

  /* ============================================================
     DUST MOTES — ambient drifting light particles, lit by the theme
     ============================================================ */
  (function dustField(){
    const canvas = document.getElementById('dustCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    function fit(){
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }
    fit();
    window.addEventListener('resize', fit);

    let motes = [];
    function initMotes(){
      motes = [];
      if(reduceMotion) return;
      const n = Math.min(50, Math.floor((window.innerWidth*window.innerHeight)/26000));
      for(let i=0;i<n;i++){
        motes.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          r: (Math.random()*1.4+0.4)*dpr,
          vy: -(Math.random()*0.12+0.04)*dpr,
          vx: (Math.random()-0.5)*0.05*dpr,
          drift: Math.random()*Math.PI*2,
          driftSpeed: 0.002+Math.random()*0.004,
          alpha: Math.random()*0.35+0.1
        });
      }
    }
    initMotes();
    window.addEventListener('resize', initMotes);

    function hexToRgba(hex, alpha){
      hex = hex.replace('#','').trim();
      if(hex.length===3){ hex = hex.split('').map(c=>c+c).join(''); }
      const r = parseInt(hex.substring(0,2),16) || 217;
      const g = parseInt(hex.substring(2,4),16) || 168;
      const b = parseInt(hex.substring(4,6),16) || 59;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function frame(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if(motes.length){
        const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#d9a83b';
        motes.forEach(m => {
          m.drift += m.driftSpeed;
          m.y += m.vy;
          m.x += m.vx + Math.sin(m.drift)*0.15*dpr;
          if(m.y < -10) m.y = canvas.height + 10;
          if(m.x < -10) m.x = canvas.width + 10;
          if(m.x > canvas.width+10) m.x = -10;

          ctx.beginPath();
          ctx.fillStyle = hexToRgba(accent, m.alpha);
          ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
          ctx.fill();
        });
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();

  /* ============================================================
     INITIAL DRAW
     ============================================================ */
  drawSand(0, false);
  renderTimeText();

})();
</script>
</body>
</html>
